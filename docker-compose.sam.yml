services:
  sam-web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: sam-web
    env_file:
      - apps/web/.env.local
    environment:
      NODE_ENV: development
      TRANSCRIPTION_PROVIDER: deepgram
    ports:
      - "3001:3001"
    command: ["pnpm", "exec", "next", "dev", "apps/web", "--webpack", "-p", "3001", "-H", "0.0.0.0"]
